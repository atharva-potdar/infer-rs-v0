syntax = "proto3";

package inference.v1;

service RpcInferenceService {
  rpc RpcInference(RpcInferenceRequest) returns (RpcInferenceResponse);
}

message RpcInferenceRequest {
  repeated float tensor = 1;
  repeated int32 shape = 2;
}

message RpcInferenceResponse {
  repeated float output = 1;
}
